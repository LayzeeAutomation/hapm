<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#01696f"/>

  <!-- Piggy bank body -->
  <ellipse cx="128" cy="148" rx="68" ry="60" fill="#f4a7b9"/>

  <!-- Snout -->
  <ellipse cx="185" cy="158" rx="20" ry="16" fill="#e8849a"/>
  <circle cx="179" cy="156" r="4" fill="#c0607a"/>
  <circle cx="191" cy="156" r="4" fill="#c0607a"/>

  <!-- Eye -->
  <circle cx="165" cy="128" r="6" fill="#fff"/>
  <circle cx="166" cy="128" r="3" fill="#333"/>

  <!-- Ear -->
  <ellipse cx="100" cy="102" rx="18" ry="22" fill="#f4a7b9" transform="rotate(-15 100 102)"/>
  <ellipse cx="100" cy="102" rx="11" ry="14" fill="#e8849a" transform="rotate(-15 100 102)"/>

  <!-- Coin slot -->
  <rect x="112" y="84" width="28" height="7" rx="3.5" fill="#c0607a"/>

  <!-- Coin -->
  <ellipse cx="126" cy="72" rx="14" ry="8" fill="#e8af34"/>
  <ellipse cx="126" cy="70" rx="14" ry="8" fill="#f5c842"/>
  <text x="126" y="73" text-anchor="middle" font-size="9" font-family="sans-serif" font-weight="bold" fill="#c9920a">£</text>

  <!-- Legs -->
  <rect x="98"  y="198" width="18" height="22" rx="9" fill="#e8849a"/>
  <rect x="122" y="198" width="18" height="22" rx="9" fill="#e8849a"/>
  <rect x="146" y="198" width="18" height="22" rx="9" fill="#e8849a"/>

  <!-- Tail -->
  <path d="M62 148 Q40 130 50 112 Q58 96 70 110" fill="none" stroke="#e8849a" stroke-width="5" stroke-linecap="round"/>
</svg>
