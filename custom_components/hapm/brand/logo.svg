<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <!-- Piggy bank icon (small, left side) -->
  <circle cx="60" cy="60" r="52" fill="#01696f"/>

  <!-- Body -->
  <ellipse cx="60" cy="70" rx="28" ry="25" fill="#f4a7b9"/>

  <!-- Snout -->
  <ellipse cx="82" cy="74" rx="9" ry="7" fill="#e8849a"/>
  <circle cx="79" cy="73" r="2" fill="#c0607a"/>
  <circle cx="85" cy="73" r="2" fill="#c0607a"/>

  <!-- Eye -->
  <circle cx="74" cy="61" r="3" fill="#fff"/>
  <circle cx="75" cy="61" r="1.5" fill="#333"/>

  <!-- Ear -->
  <ellipse cx="44" cy="48" rx="8" ry="10" fill="#f4a7b9" transform="rotate(-15 44 48)"/>
  <ellipse cx="44" cy="48" rx="5" ry="6" fill="#e8849a" transform="rotate(-15 44 48)"/>

  <!-- Coin slot -->
  <rect x="50" y="42" width="14" height="4" rx="2" fill="#c0607a"/>

  <!-- Coin -->
  <ellipse cx="57" cy="35" rx="7" ry="4" fill="#f5c842"/>
  <ellipse cx="57" cy="33" rx="7" ry="4" fill="#f5c842"/>
  <text x="57" y="36" text-anchor="middle" font-size="5" font-family="sans-serif" font-weight="bold" fill="#c9920a">£</text>

  <!-- Legs -->
  <rect x="46" y="89" width="8" height="10" rx="4" fill="#e8849a"/>
  <rect x="57" y="89" width="8" height="10" rx="4" fill="#e8849a"/>
  <rect x="68" y="89" width="8" height="10" rx="4" fill="#e8849a"/>

  <!-- Tail -->
  <path d="M34 70 Q22 62 26 52 Q30 44 36 52" fill="none" stroke="#e8849a" stroke-width="3" stroke-linecap="round"/>

  <!-- Text: HAPM -->
  <text x="130" y="52" font-family="DM Sans, sans-serif" font-size="38" font-weight="700" fill="#01696f">HAPM</text>

  <!-- Text: Pocket Money -->
  <text x="132" y="80" font-family="DM Sans, sans-serif" font-size="22" font-weight="400" fill="#555">Pocket Money</text>
</svg>
